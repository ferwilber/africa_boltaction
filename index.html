<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duelo en la Arena</title>
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <link rel="shortcut icon" href="img/favicon.png" />
  <link rel="apple-touch-icon" href="img/favicon.png" />
  <style>
    :root {
      --bg: #b98b57;
      --paper: #d7b684;
      --paper-light: #e8d2a8;
      --paper-dark: #b98b57;
      --ink: #26190f;
      --ink-soft: #5b4330;
      --red: #8e3223;
      --red-soft: #a54c3a;
      --shadow: rgba(0, 0, 0, 0.24);
      --line: rgba(38, 25, 15, 0.18);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 10%, rgba(255,255,255,0.16), transparent 24%),
        radial-gradient(circle at 88% 18%, rgba(255,255,255,0.08), transparent 22%),
        radial-gradient(circle at 30% 72%, rgba(0,0,0,0.06), transparent 25%),
        linear-gradient(180deg, #d8bc8d 0%, #c89f67 45%, #a97844 100%);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.018), rgba(255,255,255,0.018) 1px, transparent 1px, transparent 4px),
        repeating-linear-gradient(90deg, rgba(0,0,0,0.018), rgba(0,0,0,0.018) 1px, transparent 1px, transparent 5px),
        radial-gradient(circle at 75% 82%, rgba(255,255,255,0.08), transparent 20%),
        radial-gradient(circle at 14% 30%, rgba(0,0,0,0.05), transparent 16%);
      mix-blend-mode: multiply;
      opacity: 0.72;
    }

    a { color: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(56, 35, 21, 0.92);
      border-bottom: 1px solid rgba(232,210,168,0.16);
      backdrop-filter: blur(8px);
    }

    .topbar-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 88px;
      height: auto;
      display: block;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.24));
    }

    .topbar-title {
      color: #eadfca;
      text-decoration: none;
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: clamp(1.3rem, 2.8vw, 2.25rem);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      line-height: 0.95;
